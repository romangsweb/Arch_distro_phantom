# ╔══════════════════════════════════════════════════════════════╗
# ║  HYPRLAND — Flat Minimal (Green/Purple · Phantom)             ║
# ║  MacBook Pro A1706 (Touch Bar) — AI/ML Development Station   ║
# ╚══════════════════════════════════════════════════════════════╝

# ──────────────────────────────────────────────────────────────
# Monitor — Retina HiDPI (2560x1600)
# ──────────────────────────────────────────────────────────────
monitor = eDP-1, 2560x1600@60, 0x0, 2
monitor = , preferred, auto, 1

# ──────────────────────────────────────────────────────────────
# Environment Variables
# ──────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1

# ──────────────────────────────────────────────────────────────
# Autostart
# ──────────────────────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = hypridle
exec-once = gammastep
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ──────────────────────────────────────────────────────────────
# Input — MacBook Trackpad + Keyboard
# ──────────────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_options = ctrl:nocaps
    follow_mouse = 1
    sensitivity = 0.0
    accel_profile = adaptive

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
        scroll_factor = 0.8
        clickfinger_behavior = true
        tap-and-drag = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 250
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_min_speed_to_force = 20
    workspace_swipe_create_new = false
}

# ──────────────────────────────────────────────────────────────
# General — Flat Minimal, No Frills
# ──────────────────────────────────────────────────────────────
general {
    gaps_in = 3
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(7EC8A0ff)
    col.inactive_border = rgba(1e1e1eff)
    layout = dwindle
    allow_tearing = false
}

# ──────────────────────────────────────────────────────────────
# Decoration — Flat, No Blur, No Glass
# ──────────────────────────────────────────────────────────────
decoration {
    rounding = 4

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }

    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
}

# ──────────────────────────────────────────────────────────────
# Animations — Fast & Snappy (No Theatrics)
# ──────────────────────────────────────────────────────────────
animations {
    enabled = true
    first_launch_animation = false

    bezier = snap, 0.2, 1.0, 0.3, 1.0
    bezier = linear, 0, 0, 1, 1

    animation = windows, 1, 3, snap, slide
    animation = windowsOut, 1, 3, snap, slide
    animation = windowsMove, 1, 2, snap, slide
    animation = border, 1, 4, default
    animation = borderangle, 0
    animation = fade, 1, 3, snap
    animation = workspaces, 1, 3, snap, slide
    animation = specialWorkspace, 1, 3, snap, slidefadevert -20%
}

# ──────────────────────────────────────────────────────────────
# Layout — Dwindle (Bento-Grid Friendly)
# ──────────────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
    smart_split = false
    smart_resizing = true
    no_gaps_when_only = 0
}

master {
    new_status = master
    orientation = left
}

# ──────────────────────────────────────────────────────────────
# Miscellaneous
# ──────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = true
    swallow_regex = ^(kitty)$
    vfr = true
}

# ──────────────────────────────────────────────────────────────
# Window Rules — Floating Zones
# ──────────────────────────────────────────────────────────────
windowrulev2 = float, class:^(thunar)$
windowrulev2 = size 1000 700, class:^(thunar)$
windowrulev2 = center, class:^(thunar)$

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = size 800 500, class:^(pavucontrol)$
windowrulev2 = center, class:^(pavucontrol)$

windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$

windowrulev2 = float, class:^(imv)$
windowrulev2 = float, class:^(mpv)$
windowrulev2 = size 960 540, class:^(mpv)$
windowrulev2 = center, class:^(mpv)$

windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 480 270, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-490 100%-280, title:^(Picture-in-Picture)$

windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$

windowrulev2 = float, class:^(Spotify)$
windowrulev2 = size 1100 750, class:^(Spotify)$
windowrulev2 = center, class:^(Spotify)$

# No special opacity — everything solid
windowrulev2 = opacity 1.0 1.0, class:(.*)

# ──────────────────────────────────────────────────────────────
# Keybindings
# ──────────────────────────────────────────────────────────────
$mainMod = SUPER

bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating
bind = $mainMod, D, exec, rofi -show drun -theme ~/.config/rofi/phantom.rasi
bind = $mainMod, R, exec, rofi -show run -theme ~/.config/rofi/phantom.rasi
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, Tab, exec, rofi -show window -theme ~/.config/rofi/phantom.rasi

bind = $mainMod, L, exec, hyprlock

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = $mainMod, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, K, movefocus, u

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

bind = $mainMod CTRL, left, resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive, 40 0
bind = $mainMod CTRL, up, resizeactive, 0 -40
bind = $mainMod CTRL, down, resizeactive, 0 40

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioPrev, exec, playerctl previous
bindl  = , XF86AudioNext, exec, playerctl next
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Clipboard, Recording, Cava ─────────────────────────────────
bind = $mainMod, C, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/phantom.rasi | cliphist decode | wl-copy
bind = $mainMod SHIFT, R, exec, wf-recorder -g "$(slurp)" -f ~/Videos/recording-$(date +%Y%m%d_%H%M%S).mp4
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, A, exec, kitty -e cava

# ── Touch Bar Integration ──────────────────────────────────────
# Search button on Touch Bar → Rofi launcher
bind = , XF86LaunchA, exec, rofi -show drun -theme ~/.config/rofi/phantom.rasi
# Mic mute button on Touch Bar
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Eww Virtual Touch Bar Panels ──────────────────────────────
bind = $mainMod, W, exec, eww open-many ml-panel sys-panel clock-panel --toggle
bind = $mainMod SHIFT, W, exec, eww open controls-bar --toggle

# ── Rofi Scripts ───────────────────────────────────────────────
bind = $mainMod, X, exec, ~/.config/rofi/scripts/powermenu.sh
bind = $mainMod, slash, exec, ~/.config/rofi/scripts/quickactions.sh
bind = $mainMod, Space, exec, ~/.config/rofi/scripts/launcher.sh
bind = $mainMod SHIFT, C, exec, hyprpicker -a

