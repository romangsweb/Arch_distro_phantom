# ╔══════════════════════════════════════╗
# ║  HYPRLOCK — Flat Minimal Lock          ║
# ║  Phantom Theme · No Blur               ║
# ╚══════════════════════════════════════╝

background {
    monitor =
    color = rgba(10, 10, 10, 1.0)
}

label {
    monitor =
    text = $TIME
    color = rgba(212, 212, 212, 0.95)
    font_size = 86
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba(126, 200, 160, 0.7)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(85, 85, 85, 1.0)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -60
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 260, 40
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(30, 30, 30, 1.0)
    inner_color = rgba(20, 20, 20, 1.0)
    font_color = rgba(212, 212, 212, 0.9)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <span foreground="##555555">password</span>
    hide_input = false
    rounding = 2
    check_color = rgba(126, 200, 160, 0.8)
    fail_color = rgba(191, 97, 106, 0.8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000
    fail_transition = 200
    capslock_color = rgba(180, 142, 173, 0.6)
    position = 0, -130
    halign = center
    valign = center
}
