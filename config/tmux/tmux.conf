# ╔══════════════════════════════════════════════════════════════╗
# ║  TMUX — Phantom Theme                                       ║
# ║  Flat minimal · Green/Purple accents                          ║
# ╚══════════════════════════════════════════════════════════════╝

# ── General ─────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",kitty:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0
set -g focus-events on
set -g renumber-windows on
set -g set-clipboard on
set -g set-titles on
set -g set-titles-string "tmux: #W"

# ── Prefix ──────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ──────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigation (vim-style) ─────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ──────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Quick Actions ───────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind x kill-pane
bind X kill-window
bind z resize-pane -Z
bind Space next-layout
bind Tab last-window

# ── Copy Mode (vi) ─────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# ── Status Bar — Phantom Flat ──────────────────────────────────
set -g status-position top
set -g status-interval 2
set -g status-style "bg=#0a0a0a,fg=#555555"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#7EC8A0,fg=#0a0a0a,bold]  #{session_name} #[bg=#0a0a0a] "

# Right: host + time
set -g status-right-length 60
set -g status-right "#[fg=#555555]#{?client_prefix,#[fg=#7EC8A0]PREFIX ,}#[fg=#B48EAD]#{host_short} #[fg=#555555]│ #[fg=#d4d4d4]%H:%M "

# Window tabs
set -g window-status-format "#[fg=#555555] #I:#W "
set -g window-status-current-format "#[bg=#141414,fg=#7EC8A0,bold] #I:#W▸ "
set -g window-status-separator "#[fg=#1e1e1e]│"

# Pane borders
set -g pane-border-style "fg=#1e1e1e"
set -g pane-active-border-style "fg=#7EC8A0"

# Message style
set -g message-style "bg=#141414,fg=#7EC8A0"
set -g message-command-style "bg=#141414,fg=#B48EAD"

# Mode style
setw -g mode-style "bg=#7EC8A0,fg=#0a0a0a"

# Clock
setw -g clock-mode-colour "#7EC8A0"
setw -g clock-mode-style 24
