# ╔══════════════════════════════════════════════════════════════╗
# ║  PACMAN.CONF — Optimized for Power Users                     ║
# ║  Deployed to /etc/pacman.conf (requires sudo)                 ║
# ╚══════════════════════════════════════════════════════════════╝

[options]
HoldPkg     = pacman glibc
Architecture = auto

# ── Visual ──────────────────────────────────────────────────
Color
ILoveCandy
VerbosePkgLists
ParallelDownloads = 10

# ── Verification ────────────────────────────────────────────
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ── Repositories ────────────────────────────────────────────
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
