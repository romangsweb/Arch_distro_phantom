# Kitty Session — Server Admin
# Ctrl+Shift+F4 to launch
# Layout: SSH + htop + logs

new_tab servers
layout tall
cd ~
launch --title "ssh" zsh
launch --title "processes" --location=vsplit zsh -c "htop || btop || top"
launch --title "logs" --location=hsplit zsh -c "journalctl -f --priority=err || zsh"

new_tab databases
layout horizontal
cd ~
launch --title "postgres" zsh -c "pgcli || psql || zsh"
launch --title "redis" zsh -c "redis-cli monitor 2>/dev/null || zsh"
focus_tab servers
