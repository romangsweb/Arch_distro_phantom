# Kitty Session — ML Development
# Ctrl+Shift+F3 to launch
# Layout: Jupyter (left) | GPU watch (right top) | Training log (right bottom)

new_tab ml
layout tall
cd ~
launch --title "jupyter" zsh -c "jupyter lab --no-browser || ipython || zsh"
launch --title "gpu-watch" --location=vsplit zsh -c "ssh ml-server 'watch -n 2 nvidia-smi' 2>/dev/null || nvtop || zsh"
launch --title "train-log" --location=hsplit zsh -c "ssh ml-server 'tail -f ~/training/logs/latest.log' 2>/dev/null || zsh"

new_tab code
cd ~
launch --title "editor" nvim
focus_tab ml
