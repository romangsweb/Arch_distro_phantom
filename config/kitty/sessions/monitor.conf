# Kitty Session — System Monitor
# Ctrl+Shift+F2 to launch
# Layout: btop (top) | nvtop (bottom left) | Docker (bottom right)

new_tab monitor
layout grid
cd ~
launch --title "btop" btop
launch --title "nvtop" nvtop
launch --title "docker" zsh -c "lazydocker || docker stats || zsh"
launch --title "network" zsh -c "bandwhich || ss -tulnp && zsh"
focus_tab monitor
