# Kitty Session — Dev Workspace
# Ctrl+Shift+F1 to launch
# Layout: Editor (left 60%) | Terminal (right top) | Git (right bottom)

new_tab dev
layout tall
cd ~
launch --title "editor" zsh -c "nvim ."
launch --title "terminal" --location=vsplit
launch --title "git" --location=hsplit zsh -c "lazygit || zsh"
focus_tab dev
