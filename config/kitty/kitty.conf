# ╔══════════════════════════════════════════════════════════════╗
# ║  KITTY — Ultra-Personalized Terminal                         ║
# ║  Phantom Theme · Sessions · Kittens · Remote Control          ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Font ────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0
disable_ligatures cursor
modify_font cell_height 110%
modify_font baseline 0

# ── Cursor ──────────────────────────────────────────────────────
cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval 0
cursor_stop_blinking_after 0
cursor_trail 3
cursor_trail_decay 0.1 0.3
cursor_trail_start_threshold 2

# ── Scrollback ──────────────────────────────────────────────────
scrollback_lines 20000
scrollback_pager bat --style=plain --paging=always
scrollback_pager_history_size 4096
scrollback_fill_enlarged_window yes
wheel_scroll_multiplier 3.0
wheel_scroll_min_lines 1

# ── Mouse ───────────────────────────────────────────────────────
mouse_hide_wait 3.0
url_style curly
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
open_url_with default
detect_urls yes
show_hyperlink_targets yes
copy_on_select clipboard
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#

# ── Window ──────────────────────────────────────────────────────
remember_window_size  no
initial_window_width  120c
initial_window_height 36c
window_padding_width  8 12
window_margin_width   0
confirm_os_window_close 0
draw_minimal_borders yes
window_border_width 1px
active_border_color #7EC8A0
inactive_border_color #1e1e1e
bell_border_color #BF616A
single_window_margin_width -1
resize_debounce_time 0.05
resize_in_steps no
placement_strategy center

# ── No transparency — solid ─────────────────────────────────────
background_opacity 1.0
dynamic_background_opacity no

# ── Audio & Bell ────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color none
window_alert_on_bell yes
bell_on_tab "🔔 "

# ── Tab Bar — Custom Power Style ────────────────────────────────
tab_bar_edge top
tab_bar_style custom
tab_bar_min_tabs 1
tab_activity_symbol "◉"
tab_title_max_length 20
tab_title_template " {index}:{tab.active_exe} {activity_symbol}"
active_tab_title_template " {index}:{tab.active_exe} ▸"

active_tab_foreground   #0a0a0a
active_tab_background   #7EC8A0
active_tab_font_style   bold
inactive_tab_foreground #555555
inactive_tab_background #141414
inactive_tab_font_style normal
tab_bar_background      #0a0a0a
tab_bar_margin_height   0.0 0.0

# ── Wayland & System ───────────────────────────────────────────
wayland_titlebar_color background
linux_display_server wayland
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}
shell_integration enabled
notify_on_cmd_finish invisible 10.0 notify
close_on_child_death no

# ── Marks — Highlight patterns in output ────────────────────────
mark1_foreground #0a0a0a
mark1_background #7EC8A0
mark2_foreground #0a0a0a
mark2_background #B48EAD
mark3_foreground #0a0a0a
mark3_background #81A1C1

# ── Color Scheme — Phantom (Green/Purple) ───────────────────────
foreground              #d4d4d4
background              #0a0a0a
selection_foreground    #0a0a0a
selection_background    #7EC8A0

cursor                  #7EC8A0
cursor_text_color       #0a0a0a

url_color               #7EC8A0

# Normal (0-7)
color0  #1a1a1a
color1  #BF616A
color2  #7EC8A0
color3  #D4A76A
color4  #81A1C1
color5  #B48EAD
color6  #88C0D0
color7  #d4d4d4

# Bright (8-15)
color8  #555555
color9  #D08770
color10 #A3BE8C
color11 #EBCB8B
color12 #5E81AC
color13 #C792EA
color14 #8FBCBB
color15 #ffffff

# ────────────────────────────────────────────────────────────────
# KEYBINDINGS — Power User
# ────────────────────────────────────────────────────────────────

# ── Tabs ────────────────────────────────────────────────────────
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+l        next_tab
map ctrl+shift+h        previous_tab
map ctrl+shift+.        move_tab_forward
map ctrl+shift+,        move_tab_backward
map ctrl+shift+alt+t    set_tab_title
map ctrl+1              goto_tab 1
map ctrl+2              goto_tab 2
map ctrl+3              goto_tab 3
map ctrl+4              goto_tab 4
map ctrl+5              goto_tab 5

# ── Windows (splits) ───────────────────────────────────────────
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+\        launch --location=vsplit --cwd=current
map ctrl+shift+-        launch --location=hsplit --cwd=current
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window
map ctrl+shift+q        close_window
map ctrl+shift+r        start_resizing_window
map ctrl+shift+f        move_window_forward
map ctrl+shift+b        move_window_backward

# ── Font Size ──────────────────────────────────────────────────
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# ── Scrolling ──────────────────────────────────────────────────
map ctrl+shift+k        scroll_line_up
map ctrl+shift+j        scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end
map ctrl+shift+g        show_last_command_output

# ── Kittens — Built-in Extensions ──────────────────────────────
# Inline image display
map ctrl+shift+i        kitten icat
# Unicode character input
map ctrl+shift+u        kitten unicode_input
# SSH (with shell integration)
map ctrl+shift+s        kitten ssh
# Diff files visually (select 2 files)
map ctrl+shift+d        kitten diff
# Edit scrollback in $EDITOR
map ctrl+shift+e        edit_in_kitty
# Open URLs from scrollback
map ctrl+shift+o        open_url_with_hints
# Select text with keyboard hints
map ctrl+shift+p        kitten hints --type path --program -
# Hyperlink hints (insert path at cursor)
map ctrl+shift+y        kitten hints --type hyperlink

# ── Session Launchers ──────────────────────────────────────────
# Dev workspace: editor + terminal + git
map ctrl+shift+f1       launch --type=os-window kitty --session ~/.config/kitty/sessions/dev.conf
# Monitoring: btop + nvtop + Docker
map ctrl+shift+f2       launch --type=os-window kitty --session ~/.config/kitty/sessions/monitor.conf
# ML: Jupyter + logs + GPU watch
map ctrl+shift+f3       launch --type=os-window kitty --session ~/.config/kitty/sessions/ml.conf
# Server admin: SSH + htop
map ctrl+shift+f4       launch --type=os-window kitty --session ~/.config/kitty/sessions/server.conf

# ── Misc ───────────────────────────────────────────────────────
map ctrl+shift+f5       load_config_file
map ctrl+shift+f6       debug_config
map ctrl+shift+a>m      create_marker
map ctrl+shift+a>r      remove_marker
map ctrl+shift+space    toggle_layout stack

# ── Startup ────────────────────────────────────────────────────
# Default session on launch (comment out to start plain shell)
# startup_session ~/.config/kitty/sessions/dev.conf
